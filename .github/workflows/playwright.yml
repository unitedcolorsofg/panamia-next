name: Playwright Tests

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Reset the test DB to a clean slate before each run so tests never
      # inherit state from a previous run. POSTGRES_DIRECT_URL must point to a
      # dedicated Supabase test project — never the production project.
      #
      # We bootstrap the `drizzle.__drizzle_migrations` table manually so
      # migration 0015 (which enables RLS on it) has something to target.
      # In production, drizzle-kit migrate creates this table on first run;
      # in CI we apply migrations via raw psql (see "Apply migrations" step
      # below for why), so we must seed it ourselves.
      #
      # Why psql instead of drizzle-kit migrate in CI:
      # GitHub-hosted runners are IPv4-only, but Supabase's direct DB host
      # (db.<ref>.supabase.co) is IPv6-only since early 2024. That forces us
      # to use the session pooler (aws-X.pooler.supabase.com:5432) from CI.
      # drizzle-kit's postgres.js client hangs indefinitely against the
      # session pooler — psql does not. Prod (Cloudflare Workers via
      # Hyperdrive) is unaffected and continues to use drizzle-kit migrate.
      - name: Reset test database
        run: |
          psql "${{ secrets.POSTGRES_DIRECT_URL }}" -v ON_ERROR_STOP=1 <<'SQL'
          DROP SCHEMA IF EXISTS drizzle CASCADE;
          DROP SCHEMA public CASCADE;
          CREATE SCHEMA public;
          CREATE SCHEMA drizzle;
          CREATE TABLE drizzle.__drizzle_migrations (
            id SERIAL PRIMARY KEY,
            hash TEXT NOT NULL,
            created_at BIGINT
          );
          SQL

      # Apply hand-written migrations in order via psql. See "Reset test
      # database" step above for the IPv4/IPv6 background on why we can't
      # use drizzle-kit migrate here. Prod still uses drizzle-kit migrate
      # (which tracks applied migrations in drizzle.__drizzle_migrations);
      # CI wipes and reapplies every run, so tracking is unnecessary.
      - name: Apply migrations
        run: |
          set -e
          for f in drizzle/[0-9]*.sql; do
            echo "=== $f ==="
            psql "$POSTGRES_DIRECT_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
        env:
          POSTGRES_DIRECT_URL: ${{ secrets.POSTGRES_DIRECT_URL }}

      - name: Validate environment variables
        run: npm run env:check
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
          NEXT_PUBLIC_HOST_URL: ${{ vars.NEXT_PUBLIC_HOST_URL }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # wrangler dev reads .dev.vars and injects ALL entries as env bindings (env.KEY)
      # into the Worker. This is how POSTGRES_URL and auth secrets reach the workerd runtime.
      - name: Create .dev.vars for wrangler dev
        run: |
          echo "POSTGRES_URL=${{ secrets.POSTGRES_URL }}" >> .dev.vars
          echo "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}" >> .dev.vars
          echo "BETTER_AUTH_URL=${{ vars.BETTER_AUTH_URL }}" >> .dev.vars
          echo "ADMIN_EMAILS=${{ secrets.ADMIN_EMAILS }}" >> .dev.vars
          echo "TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}" >> .dev.vars
          echo "R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}" >> .dev.vars
          echo "R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}" >> .dev.vars
          echo "R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}" >> .dev.vars
          echo "R2_BUCKET_NAME=${{ vars.R2_BUCKET_NAME }}" >> .dev.vars
          echo "R2_PUBLIC_URL=${{ vars.R2_PUBLIC_URL }}" >> .dev.vars

      # `yarn build` is now just `vinext build` (no migrate prefix), so this
      # is equivalent — kept explicit for clarity that CI does not migrate
      # during build (migrations were applied in the "Apply migrations" step).
      - name: Build app
        run: yarn build
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          POSTGRES_DIRECT_URL: ${{ secrets.POSTGRES_DIRECT_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
          NEXT_PUBLIC_HOST_URL: ${{ vars.NEXT_PUBLIC_HOST_URL }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_GOOGLE_ENABLED: ${{ vars.NEXT_PUBLIC_GOOGLE_ENABLED }}
          NEXT_PUBLIC_APPLE_ENABLED: ${{ vars.NEXT_PUBLIC_APPLE_ENABLED }}
          NEXT_PUBLIC_MASTODON_ENABLED: ${{ vars.NEXT_PUBLIC_MASTODON_ENABLED }}
          NEXT_PUBLIC_WIKIMEDIA_ENABLED: ${{ vars.NEXT_PUBLIC_WIKIMEDIA_ENABLED }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}

      - name: Run Playwright tests
        run: yarn test
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
          NEXT_PUBLIC_HOST_URL: ${{ vars.NEXT_PUBLIC_HOST_URL }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_GOOGLE_ENABLED: ${{ vars.NEXT_PUBLIC_GOOGLE_ENABLED }}
          NEXT_PUBLIC_APPLE_ENABLED: ${{ vars.NEXT_PUBLIC_APPLE_ENABLED }}
          NEXT_PUBLIC_MASTODON_ENABLED: ${{ vars.NEXT_PUBLIC_MASTODON_ENABLED }}
          NEXT_PUBLIC_WIKIMEDIA_ENABLED: ${{ vars.NEXT_PUBLIC_WIKIMEDIA_ENABLED }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
